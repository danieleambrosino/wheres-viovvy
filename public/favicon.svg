    opacity="0.9"
  />

  <!-- face and neck -->
  <ellipse cx="24" cy="22" rx="9" ry="10" fill="#e5bc91" />
  <rect x="20" y="30" width="8" height="6" rx="3" fill="#e5bc91" />

  <!-- shirt (dark with white panel) -->
  <path d="M12 36 L36 36 L30 46 L18 46 Z" fill="#111111" />
  <rect x="18" y="36" width="12" height="10" rx="2" fill="#ffffff" />

  <!-- eyewear (simple round glasses) -->
  <circle
    cx="18"
    cy="22"
    r="3.2"
    stroke="#f1eee6"
    stroke-width="1.8"
    fill="none"
  />
  <circle
    cx="30"
    cy="22"
    r="3.2"
    stroke="#f1eee6"
    stroke-width="1.8"
    fill="none"
  />
  <path
    d="M21 22h6"
    stroke="#f1eee6"
    stroke-width="1.8"
    stroke-linecap="round"
  />
</svg>
