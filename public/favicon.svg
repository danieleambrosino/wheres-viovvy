  viewBox="0 0 48 46"
  fill="none"
  role="img"
  aria-label="Viovvy favicon"
>
  <rect width="48" height="46" rx="8" fill="#863bff" />

  <!-- hairstyle (base and top highlights) inspired by viovvy_classic.svg -->
