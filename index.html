<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Where's Viovvy? Cerca Viovvy nella folla, spostati sulla mappa e toccala appena la trovi."
    />
    <title>Where's Viovvy?</title>
  </head>
  <body>
    <div id="app" class="app-shell">
      <header class="hero-panel">
        <div class="hero-copy">
          <p class="app-badge">Where's Viovvy?</p>
          <h1 class="app-title">Trova Viovvy nella folla.</h1>
          <p class="app-intro">
            Memorizza il suo look, poi trascina la scena, fai zoom e toccala appena la riconosci.
          </p>
        </div>

        <section class="target-card" aria-labelledby="target-card-title">
          <div class="target-preview-frame">
            <img id="target-preview" alt="Anteprima di Viovvy" />
          </div>
          <div class="target-card__copy">
            <p id="target-card-title" class="target-card__name">Viovvy</p>
            <p class="target-card__note">
              Occhiali tondi, cappellino rosso e righe sul busto. Se la riconosci, toccala.
            </p>
          </div>
        </section>
      </header>

      <section class="control-bar">
        <section class="status-card" aria-live="polite">
          <span id="status-badge" class="status-badge" data-state="loading">
            Sto preparando la scena
          </span>
          <p id="status-message" class="status-message">
            Ancora un attimo e puoi iniziare a cercarla.
          </p>
        </section>

        <div class="control-bar__actions">
          <button id="regenerate-button" class="primary-button" type="button">
            Genera una nuova scena
          </button>
        </div>
      </section>

      <main class="play-stage">
        <section id="viewport" class="viewport" aria-label="Mappa di gioco di Where's Viovvy?">
          <div id="scene-stage" class="scene-stage"></div>
        </section>
      </main>
    </div>

    <template id="hit-feedback-template">
      <div class="hit-feedback" hidden>
        <div class="hit-feedback__box"></div>
        <div class="hit-feedback__label"></div>
      </div>
    </template>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
